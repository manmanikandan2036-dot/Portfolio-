<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manikandan | Developer Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #11111a;
    --surface2: #181825;
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-glow: rgba(0,255,136,0.15);
    --text: #e8e8f0;
    --muted: #6b6b88;
    --border: rgba(0,255,136,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.2rem 5%;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Fira Code', monospace;
    color: var(--green);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.25s;
  }
  .nav-links a:hover { color: var(--green); }

  /* HERO */
  #home {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 7rem 5% 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }
  .hero-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }
  .hero-content {
    display: flex;
    align-items: center;
    gap: 4rem;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .hero-text { flex: 1; }
  .hero-tag {
    display: inline-block;
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--green);
    background: var(--green-glow);
    border: 1px solid var(--border);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
  }
  .hero-name {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .hero-name span { color: var(--green); }
  .hero-title {
    font-family: 'Fira Code', monospace;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: var(--green);
    margin-bottom: 1.2rem;
    font-weight: 400;
  }
  .hero-tagline {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 440px;
    margin-bottom: 2.2rem;
    line-height: 1.7;
  }
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--green);
    color: #000;
    text-decoration: none;
    padding: 0.75rem 1.8rem;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    border-radius: 3px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .hero-cta::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .hero-cta:hover::after { opacity: 1; }
  .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,136,0.3); }

  /* HERO IMAGE */
  .hero-image-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .hero-img-ring {
    width: 280px; height: 280px;
    border-radius: 50%;
    position: relative;
  }
  .hero-img-ring::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--green), transparent, var(--green), transparent, var(--green));
    animation: spin 6s linear infinite;
    z-index: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hero-img-ring::after {
    content: '';
    position: absolute; inset: -12px;
    border-radius: 50%;
    background: conic-gradient(transparent 70%, rgba(0,255,136,0.2) 100%);
    animation: spin 10s linear infinite reverse;
    z-index: 0;
  }
  .hero-img-ring img {
    width: 280px; height: 280px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    position: relative;
    z-index: 1;
    border: 3px solid var(--bg);
    filter: brightness(0.95) contrast(1.05);
  }
  .hero-img-dots {
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background-image: radial-gradient(circle, rgba(0,255,136,0.4) 1px, transparent 1px);
    background-size: 12px 12px;
    opacity: 0.5;
  }

  /* SECTIONS */
  section { padding: 6rem 5%; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--green);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .section-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 3rem;
  }
  .section-line {
    width: 50px; height: 2px;
    background: var(--green);
    margin-bottom: 3rem;
  }

  /* SKILLS */
  #skills { background: var(--surface); }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .skill-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.8rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .skill-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .skill-card:hover { transform: translateY(-4px); border-color: rgba(0,255,136,0.3); }
  .skill-card:hover::before { opacity: 1; }
  .skill-icon {
    font-size: 1.8rem;
    margin-bottom: 1rem;
  }
  .skill-cat {
    font-size: 0.7rem;
    font-family: 'Fira Code', monospace;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .skill-name {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
  }
  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .skill-tag {
    font-family: 'Fira Code', monospace;
    font-size: 0.72rem;
    color: var(--green);
    background: var(--green-glow);
    border: 1px solid var(--border);
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
  }

  /* CONTACT */
  #contact { background: var(--bg); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }
  .contact-text p {
    color: var(--muted);
    line-height: 1.8;
    font-size: 1rem;
    margin-bottom: 2rem;
  }
  .social-links { display: flex; flex-direction: column; gap: 1rem; }
  .social-link {
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: var(--text);
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.25s;
    font-size: 0.95rem;
  }
  .social-link:hover {
    border-color: var(--green);
    color: var(--green);
    transform: translateX(6px);
  }
  .social-icon {
    width: 36px; height: 36px;
    background: var(--green-glow);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .social-link:hover .social-icon {
    background: rgba(0,255,136,0.25);
    border-color: var(--green);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }
  footer span { color: var(--green); }

  /* ANIMATIONS */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-in.visible {
    opacity: 1;
    transform: none;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .hero-content { flex-direction: column-reverse; text-align: center; gap: 2.5rem; }
    .hero-tagline { margin: 0 auto 2rem; }
    .hero-img-ring, .hero-img-ring img { width: 200px; height: 200px; }
    .contact-grid { grid-template-columns: 1fr; }
    .nav-links { gap: 1rem; }
  }
</style>
</head>
